name: Tag Release

on:
  #push:
  #  tags:
  #    - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de la release à déployer (ex: 2.3.0). Laisser vide pour utiliser le dernier tag disponible.'
        required: false
        type: string

jobs:
  checks:
    name: Requirements
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check user permissions
        uses: 74th/workflow-permission-action@1.0.0
        with:
          users: dedece35,glalloue,jhertout,jules-delecour-dav,olegoaer,zippy1978,utarwyn
  build:
    name: Build And Release
    runs-on: ubuntu-latest
    needs: checks
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_tag: ${{ steps.resolve_tag.outputs.release_tag }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          fi
          if [ -z "$RELEASE_TAG" ]; then
            echo "Aucun tag trouvé. Veuillez en spécifier un en entrée."
            exit 1
          fi
          echo "Tag utilisé : $RELEASE_TAG"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Checkout tag "${{ steps.resolve_tag.outputs.release_tag }}"
        uses: actions/checkout@v3
        with:
          ref: ${{ steps.resolve_tag.outputs.release_tag }}
      - name: Extract release notes
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v1
      - name: Build project
        run: mvn -e -B clean package -DskipTests
      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.resolve_tag.outputs.release_tag }}
          release_name: Release ${{ steps.resolve_tag.outputs.release_tag }}
          draft: false
          prerelease: false
          body: ${{ steps.extract-release-notes.outputs.release_notes }}
      - name: Export plugin Jar files
        id: export_jar_files
        uses: actions/upload-artifact@v4
        with:
          name: creedengo-plugins
          path: target
      - name: Export UPLOAD_URL
        id: export_upload_url
        run: echo "upload_url=${{ steps.create_release.outputs.upload_url }}" >> $GITHUB_OUTPUT

  upload:
    name: Upload Python Plugin
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Import plugin JAR files
        id: import_jar_files
        uses: actions/download-artifact@v4
        with:
          name: creedengo-plugins
          path: target
      - name: Upload Release Asset - Python Plugin
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.build.outputs.upload_url }}
          asset_path: target/creedengo-python-plugin-${{ needs.build.outputs.release_tag }}.jar
          asset_name: creedengo-python-plugin-${{ needs.build.outputs.release_tag }}.jar
          asset_content_type: application/zip
