name: Trigger Dependabot Updates

on:
  workflow_dispatch:
    inputs:
      ecosystem:
        description: "Package ecosystem to update"
        required: true
        default: "maven"
        type: choice
        options:
          - maven
          - all
      directory:
        description: "Directory containing the package manifest"
        required: true
        default: "/"
        type: string

jobs:
  trigger-dependabot:
    name: Trigger Dependabot
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Dependabot via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          ECOSYSTEM="${{ inputs.ecosystem }}"
          DIRECTORY="${{ inputs.directory }}"

          echo "🤖 Déclenchement de Dependabot pour ${OWNER}/${REPO}..."
          echo "   Écosystème : ${ECOSYSTEM}"
          echo "   Répertoire : ${DIRECTORY}"
          echo ""

          if [ "$ECOSYSTEM" = "all" ]; then
            ECOSYSTEMS=("maven")
          else
            ECOSYSTEMS=("$ECOSYSTEM")
          fi

          SUCCESS=0
          FAIL=0

          for ECO in "${ECOSYSTEMS[@]}"; do
            echo "📦 Vérification des mises à jour pour l'écosystème : ${ECO}"

            HTTP_CODE=$(curl -s -o /tmp/response_body.json -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${OWNER}/${REPO}/dependabot/updates" \
              -d "{\"package-ecosystem\": \"${ECO}\", \"directory\": \"${DIRECTORY}\"}")

            BODY=$(cat /tmp/response_body.json)

            if [ "$HTTP_CODE" -eq 201 ] || [ "$HTTP_CODE" -eq 202 ] || [ "$HTTP_CODE" -eq 204 ]; then
              echo "   ✅ Succès (HTTP ${HTTP_CODE})"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "   ⚠️  HTTP ${HTTP_CODE} — L'API ne supporte pas le déclenchement direct."
              echo "   ℹ️  Réponse : ${BODY}"
              FAIL=$((FAIL + 1))
            fi
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Résultat : ${SUCCESS} succès / ${FAIL} échec(s)"
          echo ""
          echo "💡 Si l'API directe n'est pas disponible, utilisez :"
          echo "   https://github.com/${OWNER}/${REPO}/network/updates"
          echo "   → Cliquez sur 'Check for updates' pour chaque écosystème"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Open Dependabot update page (summary)
        run: |
          echo "## 🤖 Dependabot - Déclenchement Manuel" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Paramètre | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Écosystème | \`${{ inputs.ecosystem }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Répertoire | \`${{ inputs.directory }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dépôt | \`${{ github.repository }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Étapes suivantes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Vérifiez les PRs créées par Dependabot : [Pull Requests](https://github.com/${{ github.repository }}/pulls?q=is%3Apr+author%3Aapp%2Fdependabot)" >> $GITHUB_STEP_SUMMARY
          echo "2. Ou forcez via l'interface : [Dependabot Updates](https://github.com/${{ github.repository }}/network/updates)" >> $GITHUB_STEP_SUMMARY

